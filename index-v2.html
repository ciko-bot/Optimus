<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Optimus v2 — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#0f1f3d;--navy-m:#1a3260;
  --accent:#2563eb;--accent-l:#3b82f6;
  --off:#f8faff;--text:#0f1f3d;--text2:#4a5a7a;--text3:#8a9ab8;
  --border:rgba(15,31,61,0.10);--red:#dc2626;
  --font:'DM Sans',sans-serif;--serif:'Playfair Display',serif;--mono:'DM Mono',monospace;
  --shadow-lg:0 12px 48px rgba(15,31,61,0.16);
}
html,body{min-height:100vh;font-family:var(--font);color:var(--text);background:var(--off);}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 0% 0%,rgba(37,99,235,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 100% 100%,rgba(15,31,61,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(37,99,235,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;position:relative;z-index:1;}
.card{width:100%;max-width:420px;background:rgba(255,255,255,0.92);backdrop-filter:blur(24px);border:1px solid rgba(37,99,235,0.12);border-radius:24px;box-shadow:var(--shadow-lg);padding:40px 36px 36px;animation:cardIn 0.5s cubic-bezier(0.22,1,0.36,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
.logo-mark{width:56px;height:56px;background:var(--navy);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;position:relative;}
.logo-mark::before{content:'';position:absolute;width:32px;height:32px;border:3px solid rgba(255,255,255,0.15);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
.logo-mark::after{content:'';position:absolute;width:16px;height:16px;background:var(--accent-l);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
.logo-o{font-family:var(--serif);font-size:22px;color:white;position:relative;z-index:2;}
.brand-name{font-family:var(--serif);font-size:26px;color:var(--navy);letter-spacing:-0.5px;margin-bottom:2px;}
.brand-sub{font-size:11px;color:var(--text3);letter-spacing:0.5px;}
.brand-ver{display:inline-block;background:var(--accent-l);color:white;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
.inp-wrap{position:relative;}
.inp-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}
.form-input{width:100%;height:48px;padding:0 14px 0 42px;border:1.5px solid rgba(15,31,61,0.12);border-radius:12px;font-family:var(--font);font-size:14px;font-weight:500;color:var(--text);background:rgba(248,250,255,0.8);outline:none;transition:all 0.2s;-webkit-appearance:none;}
.form-input::placeholder{color:var(--text3);}
.form-input:focus{border-color:var(--accent);background:white;box-shadow:0 0 0 3px rgba(37,99,235,0.10);}
.inp-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:4px;}
.err-msg{display:none;align-items:center;gap:8px;background:rgba(220,38,38,0.06);border:1px solid rgba(220,38,38,0.2);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:500;color:var(--red);margin-bottom:16px;}
.err-msg.show{display:flex;}
.btn-login{width:100%;height:50px;background:var(--navy);color:white;border:none;border-radius:12px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;margin-top:4px;}
.btn-login:hover{background:var(--navy-m);}
.btn-login:active{transform:scale(0.99);}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;}
.btn-login.loading::after{content:'';position:absolute;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;top:50%;left:50%;transform:translate(-50%,-50%);}
.btn-login.loading span{opacity:0;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.card-footer{margin-top:20px;text-align:center;font-size:11px;color:var(--text3);}
.page-footer{margin-top:24px;font-size:11px;color:var(--text3);text-align:center;position:relative;z-index:1;}
@media(max-width:480px){.card{padding:32px 24px 28px;border-radius:20px;}}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-mark"><span class="logo-o">O</span></div>
      <div class="brand-name">Optimus <span class="brand-ver">v2</span></div>
      <div class="brand-sub">Powered by Supabase</div>
    </div>
    <div class="divider"></div>
    <div class="err-msg" id="err-msg"><span>⚠</span><span id="err-text">Username atau password salah.</span></div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="inp-wrap">
        <input class="form-input" id="inp-user" type="text" placeholder="Masukkan username" autocomplete="username" autocapitalize="none" onkeydown="onKey(event)">
        <span class="inp-icon">👤</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="inp-wrap">
        <input class="form-input" id="inp-pass" type="password" placeholder="Masukkan password" autocomplete="current-password" onkeydown="onKey(event)">
        <span class="inp-icon">🔑</span>
        <button class="inp-toggle" type="button" onclick="togglePass()" id="btn-toggle">👁</button>
      </div>
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()"><span>Masuk</span></button>
    <div class="card-footer">Hubungi admin jika lupa password</div>
  </div>
  <div class="page-footer">Optimus v2 &nbsp;·&nbsp; Supabase Edition</div>
</div>

<script>
const SUPABASE_URL = 'https://ltpzxgjgkhneogydgezp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cHp4Z2pna2huZW9neWRnZXpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTk1MzMsImV4cCI6MjA5Mzc5NTUzM30.ISSkjFBioakcH1to7p_y26VWqKyYsndnvC11MME_m30';

async function sbFetch(path, options={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      ...(options.headers||{})
    }
  });
  if(!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function doLogin() {
  const username = document.getElementById('inp-user').value.trim();
  const password = document.getElementById('inp-pass').value;
  const btn = document.getElementById('btn-login');
  const errMsg = document.getElementById('err-msg');
  if(!username||!password) { showErr('Username dan password tidak boleh kosong.'); return; }
  errMsg.classList.remove('show');
  btn.classList.add('loading'); btn.disabled = true;
  try {
    const data = await sbFetch('users?username=eq.'+encodeURIComponent(username)+'&password=eq.'+encodeURIComponent(password)+'&select=username,nama,role');
    if(!data||data.length===0) { showErr('Username atau password salah.'); btn.classList.remove('loading'); btn.disabled=false; return; }
    const user = data[0];
    sessionStorage.setItem('optimus_user', JSON.stringify({username:user.username, nama:user.nama, role:user.role}));
    window.location.href = user.role==='owner' ? 'owner-v2.html' : 'staff-v2.html';
  } catch(err) {
    showErr('Gagal terhubung ke server. Coba lagi.');
    btn.classList.remove('loading'); btn.disabled=false;
  }
}

function togglePass() {
  const inp = document.getElementById('inp-pass');
  const btn = document.getElementById('btn-toggle');
  inp.type = inp.type==='password' ? 'text' : 'password';
  btn.textContent = inp.type==='password' ? '👁' : '🙈';
}

function onKey(e) { if(e.key==='Enter') doLogin(); }

function showErr(msg) {
  document.getElementById('err-text').textContent = msg;
  document.getElementById('err-msg').classList.add('show');
}

const existing = sessionStorage.getItem('optimus_user');
if(existing) {
  try {
    const u = JSON.parse(existing);
    window.location.href = u.role==='owner' ? 'owner-v2.html' : 'staff-v2.html';
  } catch(e) { sessionStorage.removeItem('optimus_user'); }
}
</script>
</body>
</html>
